# ============================================================
# 百度主动推送 · GitHub Actions 工作流
# 放置位置：iBitBetter.github.io 仓库的  .github/workflows/baidu-push.yml
#           （与你的 Bing 推送工作流同仓；该仓库的 push = 内容已部署上线 = sitemap 已更新）
# 配套文件：baidu_push.py 放到该仓库根目录
# ============================================================
name: Baidu Push

on:
  push:
    branches: [main]      # ← 即 iBitBetter.github.io 仓库的默认分支（Pages 源，通常 main）
  workflow_dispatch:       # 允许在 Actions 页面手动触发

jobs:
  baidu-push:
    runs-on: ubuntu-latest
    # 注意：Gmeek 先把站点部署到 GitHub Pages，Pages 上线有延迟。
    # 若推送后百度报 404，多半是 Pages 尚未部署完。可选方案：
    #   1) 改用 workflow_run 监听 Gmeek 的部署任务完成后再跑；
    #   2) 部署完成后到 Actions 页手动点一次 "Run workflow"。
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Push URLs to Baidu
        env:
          # token 来自仓库 Secrets，不会出现在日志明文（GitHub 自动屏蔽）
          BAIDU_TOKEN: ${{ secrets.BAIDU_TOKEN }}
          BAIDU_SITE: https://ibitbetter.space
          BAIDU_SITEMAP: https://ibitbetter.space/sitemap.xml
        run: python baidu_push.py
