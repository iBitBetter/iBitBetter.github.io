name: Generate Sitemap

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generate sitemap.xml
        run: |
          python3 << 'EOF'
          import os, re, subprocess, datetime

          SITE_URL = "https://ibitbetter.github.io"
          OUTPUT = "static/sitemap.xml"  # 修改点1：输出到 docs 目录

          def get_lastmod(filepath):
              try:
                  result = subprocess.run(
                      ["git", "log", "-1", "--format=%ci", "--", filepath],
                      capture_output=True, text=True
                  )
                  if result.stdout.strip():
                      return result.stdout.strip()[:10]
              except:
                  pass
              return datetime.date.today().isoformat()

          def get_priority(url_path):
              if url_path == "/":
                  return "1.0"
              if "/post/" in url_path:
                  return "0.8"
              return "0.5"

          def get_changefreq(url_path):
              if url_path == "/":
                  return "daily"
              if "/post/" in url_path:
                  return "weekly"
              return "monthly"

          urls = []

          # 首页 (修改点2：检测 docs/index.html)
          urls.append({
              "loc": SITE_URL + "/",
              "lastmod": get_lastmod("docs/index.html") if os.path.exists("docs/index.html") else "",
              "changefreq": "daily",
              "priority": "1.0"
          })

          # 扫描 docs 下的所有 HTML 文件 (修改点3：扫描目录改为 docs)
          if os.path.exists("docs"):
              for root, dirs, files in os.walk("docs"):
                  # 跳过隐藏目录和 node_modules
                  dirs[:] = [d for d in dirs if not d.startswith(".") and d not in ("node_modules",)]
                  for fname in files:
                      if not fname.endswith(".html"):
                          continue
                      
                      # 去重：跳过根目录的 index.html，因为前面已经手动添加了首页
                      if root == "docs" and (fname == "index.html" or fname == "privacy.html" or fname == "terms.html" or fname == "google475e77f4cf90814b.html"):
                          continue
                          
                      fpath = os.path.join(root, fname)
                      
                      # 修改点4：获取相对于 docs 的路径，确保 URL 中不带 /docs/
                      relpath = os.path.relpath(fpath, "docs").replace("\\", "/")
                      
                      # 跳过 sitemap 自己
                      if "sitemap" in fname.lower():
                          continue
                          
                      url_path = "/" + relpath
                      full_url = SITE_URL + url_path
                      lastmod = get_lastmod(fpath)
                      urls.append({
                          "loc": full_url,
                          "lastmod": lastmod,
                          "changefreq": get_changefreq(url_path),
                          "priority": get_priority(url_path)
                      })

          # 写 sitemap.xml
          with open(OUTPUT, "w", encoding="utf-8") as f:
              f.write('<?xml version="1.0" encoding="UTF-8"?>\n')
              f.write('<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n')
              for u in urls:
                  f.write("  <url>\n")
                  f.write(f"    <loc>{u['loc']}</loc>\n")
                  if u['lastmod']:
                      f.write(f"    <lastmod>{u['lastmod']}</lastmod>\n")
                  f.write(f"    <changefreq>{u['changefreq']}</changefreq>\n")
                  f.write(f"    <priority>{u['priority']}</priority>\n")
                  f.write("  </url>\n")
              f.write('</urlset>\n')

          print(f"sitemap.xml 生成完成，共 {len(urls)} 个 URL")
          EOF

      - name: Commit and push sitemap.xml
        run: |
          git config user.name "ibitbetter"
          git config user.email "xbitbetter@gmail.com"
          git add static/sitemap.xml # 修改点5：提交指定为 docs 目录下的文件
          git diff --cached --quiet || git commit -m "🎉chore: auto-generate sitemap.xml [skip ci]"
          git push
